<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Homework List App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.9.0/moment-with-locales.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
    <script src="static/timepicker.js"></script>
    
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.15.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script
    src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datetimepicker/4.7.14/js/bootstrap-datetimepicker.min.js"></script>
    
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.3.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datetimepicker/4.7.14/css/bootstrap-datetimepicker.min.css">

</head>

<body>
    <div class="container">
        <div class="text-center panel-body">
            <h1>Welcome to My Homework List App!</h1>
        </div>
        <div class="row">
            <div class="row panel-body">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <h4 class="panel-title">
                            <a data-toggle="collapse" href="#collapseAdd">Add New Homeworks</a>
                        </h4>
                    </div>
                    <div id="collapseAdd" class="panel-body">
                        <!-- Add this form below the task list in index.html -->
                        <form method="POST" class="form-horizontal" action="{{ url_for('add_task') }}">
                            <div class="form-group">
                                <label class="control-label col-sm-2" for="newTask">Homework Title:</label>
                                <div class="col-sm-10">
                                    <input type="text" class="form-control" id="title" name="title" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="control-label col-sm-2" for="description">Description:</label>
                                <div class="col-sm-10">
                                    <input type="text" class="form-control" id="description" name="description" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="control-label col-sm-2" for="datetimepicker1">When:</label>
                                <div class='col-sm-10'>
                                    <div class='input-group date' id='datetimepicker1'>
                                        <input type='text' class="form-control" id="when" name="when" required />
                                        <span class="input-group-addon">
                                            <span class="glyphicon glyphicon-calendar"></span>
                                        </span>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="col-sm-offset-2 col-sm-10">
                                    <button type="submit" class="btn btn-default">Add</button>
                                </div>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="panel-group col-sm-offset-0">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        <h4 class="panel-title">
                            <a data-toggle="collapse" href="#collapseList">Your homeworks</a>
                        </h4>
                    </div>
                    <div id="collapseList">
                        <!-- Modify the list in index.html to include Delete buttons -->
                        <div>
                            {% for task in tasks %}
                            <div class="panel-body">
                                <div>
                                    <div class="col-sm-10">
                                        <input type="checkbox" id="{{ task.id }}" name="taskCheckbox"
                                            value="{{ task.id }}">
                                        <label for="{{ task.id }}">{{ task.start.dateTime }}: {{ task.summary }}</label>
                                    </div>
                                    <div class="col-sm-offset-11">
                                        <button type="button" class="btn btn-danger"
                                            onclick="deleteTask({{ task.id }})">Delete</button>
                                    </div>
                                </div>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
    <script>
        function deleteTask(index) {
            document.getElementById('taskCheckbox-' + index).checked = false;
            document.forms[0].submit();
        }
    </script>
</body>

</html>
